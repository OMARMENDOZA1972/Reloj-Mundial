<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra World Clock 195</title>

<style>
:root {
    --bg-main: #05070f;
    --bg-card: rgba(10, 14, 26, 0.4);
    --bg-card-hover: rgba(0, 247, 255, 0.12);
    --accent: #00f7ff;
    --accent-sec: #ff2a5f;
    --text-main: #ffffff;
    --text-muted: #64748b;
    --border-color: rgba(255, 255, 255, 0.08);
}

body {
    margin: 0;
    font-family: 'Segoe UI', Roboto, sans-serif;
    background-color: var(--bg-main);
    background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" opacity="0.12"><path fill="%2300f7ff" d="M150,150 Q180,120 220,130 T300,160 T380,120 T420,180 T500,200 T600,150 T700,180 T800,130 T900,160 L920,250 T850,320 T750,380 T650,350 T550,420 T400,390 T300,430 T200,380 T100,280 Z M250,300 Q220,330 180,350 T120,400 L110,430 T160,450 T250,410 Z M750,320 Q800,350 850,380 T900,420 L920,400 Z"/></svg>'), 
                     linear-gradient(180deg, #05070f 0%, #0a1120 100%);
    background-repeat: no-repeat;
    background-position: center 40%;
    background-size: 85% auto;
    background-attachment: fixed;
    color: var(--text-main);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    box-sizing: border-box;
}

.app-grid {
    width: 100%;
    max-width: 1200px;
    padding: 30px;
    display: grid;
    grid-template-columns: 1fr 380px;
    grid-template-rows: auto 1fr;
    gap: 30px;
    align-items: start;
    z-index: 1;
}

.header {
    grid-column: 1 / 2;
    grid-row: 1 / 2;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 0.5px;
    color: #ffffff;
}
.header span {
    color: var(--accent);
    text-shadow: 0 0 15px rgba(0, 247, 255, 0.4);
}

.search-container {
    grid-column: 2 / 3;
    grid-row: 1 / 2;
    width: 100%;
}

input {
    width: 100%;
    padding: 14px 20px;
    border-radius: 14px;
    border: 1px solid var(--border-color);
    background: rgba(10, 14, 26, 0.6);
    color: white;
    outline: none;
    font-size: 15px;
    box-sizing: border-box;
    transition: all 0.3s ease;
    backdrop-filter: blur(8px);
}

input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 15px rgba(0, 247, 255, 0.15);
    background: rgba(10, 14, 26, 0.8);
}

/* SECCIÓN DEL RELOJ */
.clock-section {
    grid-column: 1 / 2;
    grid-row: 2 / 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    min-height: 500px;
}

canvas {
    background: transparent;
    margin-bottom: 25px;
}

#countryName {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 4px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
}

/* NUEVO: Diferencia horaria */
#timeDiff {
    font-size: 13px;
    color: var(--accent);
    background: rgba(0, 247, 255, 0.1);
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 15px;
    font-weight: 600;
    letter-spacing: 0.5px;
    border: 1px solid rgba(0, 247, 255, 0.15);
}

/* NUEVO: Contenedor digital con estado Día/Noche */
.digital-wrap {
    display: flex;
    align-items: center;
    gap: 15px;
    margin: 5px 0;
}

#dayNightIcon {
    font-size: 28px;
    filter: drop-shadow(0 0 8px rgba(255,255,255,0.3));
}

#time {
    color: var(--accent);
    font-size: 56px;
    font-weight: 700;
    font-family: 'Courier New', Courier, monospace;
    letter-spacing: 2px;
    text-shadow: 0 0 25px rgba(0, 247, 255, 0.4), 0 4px 10px rgba(0,0,0,0.8);
}

#date {
    color: var(--text-muted);
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 600;
    text-shadow: 0 2px 5px rgba(0,0,0,0.5);
    margin-top: 5px;
}

/* SECCIÓN LATERAL DERECHA */
.list-section {
    grid-column: 2 / 3;
    grid-row: 2 / 3;
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 24px;
    padding: 15px;
    box-sizing: border-box;
    backdrop-filter: blur(12px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

.list {
    width: 100%;
    height: 60vh;
    overflow-y: auto;
    padding-right: 5px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(105px, 1fr));
    gap: 8px;
    box-sizing: border-box;
}

.list::-webkit-scrollbar {
    width: 5px;
}
.list::-webkit-scrollbar-track {
    background: transparent;
}
.list::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.1);
    border-radius: 10px;
}
.list::-webkit-scrollbar-thumb:hover {
    background: var(--accent);
}

.item {
    padding: 12px 6px;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid transparent;
    border-radius: 12px;
    text-align: center;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
}

.item:hover {
    background: var(--bg-card-hover);
    border-color: rgba(0, 247, 255, 0.2);
    transform: translateY(-2px);
}

.item .flag {
    font-size: 22px;
}

.item .name {
    font-weight: 500;
    color: #cbd5e1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    width: 100%;
}

@media (max-width: 850px) {
    body {
        background-size: 140% auto;
        background-position: center 20%;
    }
    .app-grid {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto auto;
        padding: 15px;
        gap: 15px;
    }
    .header {
        grid-column: 1 / 2;
        grid-row: 1 / 2;
        text-align: center;
    }
    .search-container {
        grid-column: 1 / 2;
        grid-row: 2 / 3;
    }
    .clock-section {
        grid-column: 1 / 2;
        grid-row: 3 / 4;
        min-height: auto;
        padding: 20px 0;
    }
    #time {
        font-size: 42px;
    }
    .list-section {
        grid-column: 1 / 2;
        grid-row: 4 / 5;
    }
    .list {
        height: 35vh;
    }
}
</style>
</head>

countries.sort((a, b) => a.n.localeCompare(b.n));

const list = document.getElementById("list");
countries.forEach(c => {
    let div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `<span class="flag">${c.f}</span><span class="name">${c.n}</span>`;
    div.onclick = () => setCountry(c);
    list.appendChild(div);

let current = countries.find(c => c.n === "México") || countries[0];
setCountry(current);

function setCountry(c){
    current = c;
    document.getElementById("countryName").innerHTML = `${c.f} ${c.n}`;
    updateRelativeTime(c.t);
}

// NUEVO: Calcular la diferencia horaria dinámica en tiempo real
function updateRelativeTime(timeZone) {
    try {
        const local = new Date();
        const target = new Date(local.toLocaleString("en-US", { timeZone: timeZone }));
        
        // Obtener la diferencia de horas exacta redondeando
        const diffMs = target - local;
        const diffHours = Math.round(diffMs / (1000 * 60 * 60));
        
        const textEl = document.getElementById("timeDiff");
        if (diffHours === 0) {
            textEl.innerText = "Misma hora que tu región local";
        } else {
            textEl.innerText = `${diffHours > 0 ? '+' : ''}${diffHours} horas respecto a tu hora local`;
        }
    } catch(e) {
        document.getElementById("timeDiff").innerText = "Zona horaria detectada";
    }
}

const canvas = document.getElementById("clock");
const ctx = canvas.getContext("2d");
const r = canvas.height / 2;
ctx.translate(r, r);

    ctx.clearRect(-r, -r, canvas.width, canvas.height);

    try {
        const now = new Date(
            new Date().toLocaleString("en-US", {timeZone: current.t})
        );

        let s = now.getSeconds();
        let m = now.getMinutes();
        let h = now.getHours();

        // NUEVO: Cambiar icono dinámico según hora (Sol / Luna)
        const iconEl = document.getElementById("dayNightIcon");
        if(h >= 6 && h < 18) {
            iconEl.innerText = "☀️";
        } else {
            iconEl.innerText = "🌙";
        }

        h = h % 12;

        // Esfera base del reloj
        ctx.beginPath();
        ctx.arc(0, 0, r - 12, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(5, 7, 15, 0.8)"; 
        ctx.fill();
        ctx.lineWidth = 3;
        ctx.strokeStyle = "rgba(0, 247, 255, 0.4)";
        ctx.stroke();

        // 12 marcas de las horas
        for (let i = 0; i < 12; i++) {
            ctx.beginPath();
            const esPrincipal = (i % 3 === 0);
            ctx.lineWidth = esPrincipal ? 3 : 1.5;
            ctx.strokeStyle = esPrincipal ? "rgba(0, 247, 255, 0.8)" : "rgba(255, 255, 255, 0.2)";
            ctx.moveTo(0, -(r - 24));
            ctx.lineTo(0, -(r - 14));
            ctx.stroke();
            ctx.rotate(Math.PI / 6);
        }

        // NUEVO: Efecto Glow (Brillo neón) nativo en Canvas para las agujas
        ctx.shadowBlur = 10;
        
        // Aguja de las horas (Glow blanco)
        ctx.shadowColor = "#ffffff";
        drawHand((h * Math.PI / 6) + (m * Math.PI / 360), r * 0.45, 6, "#ffffff");
        
        // Aguja de los minutos (Glow cian)
        ctx.shadowColor = "#00f7ff";
        drawHand((m * Math.PI / 30), r * 0.7, 4, "#00f7ff");
        
        // Aguja de los segundos (Glow rosa)
        ctx.shadowColor = "#ff2a5f";
        drawHand((s * Math.PI / 30), r * 0.8, 2, "#ff2a5f");

        // Quitar el shadow para el resto de elementos y pintar el centro
        ctx.shadowBlur = 0;
        ctx.beginPath();
        ctx.arc(0, 0, 5, 0, Math.PI * 2);
        ctx.fillStyle = "#ff2a5f";
        ctx.fill();

        // Render digital
        document.getElementById("time").innerText = now.toLocaleTimeString('es-ES', {hour12: false});
        
        const opcionesFecha = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById("date").innerText = now.toLocaleDateString('es-ES', opcionesFecha);

    } catch (e) {
        document.getElementById("time").innerText = "--:--:--";
        document.getElementById("date").innerText = "Zona no soportada";
    }

    requestAnimationFrame(draw);
}

function drawHand(pos, len, w, color){
    ctx.beginPath();
    ctx.lineWidth = w;
    ctx.strokeStyle = color;
    ctx.lineCap = "round";

    ctx.rotate(pos);
    ctx.moveTo(0, 0);
    ctx.lineTo(0, -len);
    ctx.stroke();
    ctx.rotate(-pos);
}

// Actualizar la diferencia de horas de fondo cada tanto por si cambia la hora del equipo local
setInterval(() => updateRelativeTime(current.t), 60000);

draw();

function filter(){
    let val = document.getElementById("search").value.toLowerCase();
    document.querySelectorAll(".item").forEach(el => {
        const text = el.querySelector(".name").innerText.toLowerCase();
        el.style.display = text.includes(val) ? "flex" : "none";
    });
}
</script>
